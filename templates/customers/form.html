{% extends "base.html" %}
{% block title %}고객사 추가{% endblock %}
{% block content %}
<div class="page-header">
  <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="{{ url_for('customer_list') }}">고객사 목록</a></li><li class="breadcrumb-item active">추가</li></ol></nav>
  <h1><i class="bi bi-plus-circle me-2"></i>고객사 추가</h1>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">고객사명 <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" placeholder="예: (주)홈플러스" required>
      </div>
      <div class="mb-4">
        <label class="form-label">메모</label>
        <textarea name="memo" class="form-control" rows="2" placeholder="담당자, 계약 조건 등"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-grow-1">등록</button>
        <a href="{{ url_for('customer_list') }}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
